# [printer]
# kinematics: corexy
# max_velocity: 700            
# max_accel: 40000             
# minimum_cruise_ratio: 0.25
# max_z_velocity: 10           
# max_z_accel: 500             
# square_corner_velocity: 5.0  

[printer]
kinematics: corexy
max_velocity: 700
max_accel: 5500      
minimum_cruise_ratio: 0.5
max_z_velocity: 20
max_z_accel: 500
square_corner_velocity: 5.0

[lis2dw]
cs_pin: extra_mcu:PB12
spi_software_sclk_pin: extra_mcu:PB13
spi_software_mosi_pin: extra_mcu:PB15
spi_software_miso_pin: extra_mcu:PB14
axes_map: x,z,y

# [resonance_tester]
# accel_chip: lis2dw
# probe_points:
#     250, 250, 30  
# accel_per_hz:100
# min_freq: 35
# max_freq: 45
# max_smoothing: 0.25
# hz_per_sec: 1.0

[resonance_tester]
accel_chip: lis2dw
probe_points: 250, 250, 30  
max_smoothing: 0.05
# accel_per_hz:100
# min_freq: 35
# max_freq: 45
# hz_per_sec: 1.0

[input_shaper]
damping_ratio_x: 0.001
damping_ratio_y: 0.001

# [probe_eddy_current eddy]
# sensor_type: ldc1612
# # descend_z: True
# z_offset: 3.50
# i2c_mcu: extra_mcu
# i2c_bus: i2c2
# x_offset: -19.8
# y_offset: -0.75
# # vir_contact_speed: 3.0   

[probe_eddy_ng eddy]
sensor_type: ldc1612
i2c_mcu: extra_mcu
i2c_software_scl_pin: extra_mcu:PB10
i2c_software_sda_pin: extra_mcu:PB11
# i2c_bus: i2c2
x_offset: -19.8
y_offset: -0.75

probe_speed: 5.0
lift_speed: 10.0
move_speed: 50.0
home_trigger_height: 2.0
calibration_z_max: 5.0
reg_drive_current: 15
#tap_drive_current: 0
tap_start_z: 3.0
tap_target_z: -0.350
tap_mode: butter
tap_threshold: 250
tap_speed: 3.0
tap_adjust_z: 0.000
tap_samples: 3
tap_max_samples: 8
tap_samples_stddev: 0.025

[z_offset_calibration]  
non_contact_probe:probe_eddy_current eddy
contact_probe:probe_eddy_current eddy
endstop_xy_position: 250,251   
# center_xy_position: -10,10                   
z_hop: 5                       
z_hop_speed: 10
internal_endstop_offset: -0.2 

[bed_mesh]
speed: 400
horizontal_move_z: 1.5
algorithm: bicubic 
mesh_min: 13,15              
mesh_max: 476,490
probe_count: 60,60
fade_start: 0
fade_end: 10
scan_overshoot: 4

[quad_gantry_level]          
gantry_corners:              
	-70,-40
	550,600
points:
    50, 30
    50, 470
    490, 470
    490, 30
speed: 400                   
horizontal_move_z: 15
retry_tolerance: 0.1
retries: 15                  
max_adjust: 20

