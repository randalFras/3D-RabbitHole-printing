[multi_pin fan_pins]
pins: extra_mcu:PA7, extra_mcu:PB0

[fan]
pin:multi_pin: fan_pins
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
off_below: 0.10

[fan_generic fan2] 
pin: PB0
tachometer_pin: PB1
max_power: 1.0

[fan_generic fan3] 
pin: PE11
tachometer_pin: PE13
max_power: 1.0

[led Printer_Lights]
white_pin: PD13
cycle_time: 0.001
initial_WHITE: 1.0

[heater_fan hotend_fan]      
pin: extra_mcu: PA6   
max_power: 1.0               
kick_start_time: 0.5         
heater: extruder             
heater_temp: 45              
tachometer_pin:extra_mcu: PA1
tachometer_ppr: 1
tachometer_poll_interval: 0.0013

