[update_manager]
channel: dev
refresh_interval: 168

# [timelapse]
# output_path: ~/printer_data/timelapse/
# frame_path: /tmp/timelapse/printer
# autorender: False

[update_manager Demon_Klipper_Essentials_Unified]
type: git_repo
path: ~/printer_data/config/Demon_Klipper_Essentials_Unified
origin: https://github.com/3DPrintDemon/Demon_Klipper_Essentials_Unified.git
primary_branch: main
is_system_service: False
managed_services: klipper

[update_manager crowsnest]
type: git_repo
path: ~/crowsnest
origin: https://github.com/mainsail-crew/crowsnest.git
primary_branch: v5
managed_services: crowsnest
system_dependencies: system-dependencies.json
virtualenv: ~/crowsnest-env
requirements: requirements.txt

[file_manager]
enable_object_processing: True

[power Auto Lights]
type: klipper_device
object_name: gcode_macro SET_AUTO_LIGHTS
locked_while_printing: True

# [update_manager fluidd]
# path: /home/sovol/fluidd
# repo: fluidd-core/fluidd
# channel: stable
# type: web
# persistent_files:
#     config.json

[file_manager]
enable_object_processing: True 
    
[update_manager klipper-backup]
type: git_repo
path: ~/klipper-backup
origin: https://github.com/Staubgeborener/klipper-backup.git
managed_services: moonraker
primary_branch: main
[include octoapp-system.cfg]

[simplyprint]

[update_manager mainsail]
path: /home/sovol/mainsail
repo: mainsail-crew/mainsail
channel: stable
type: web
persistent_files:
    config.json

[update_manager mainsail-config]
managed_services: klipper
origin: https://github.com/mainsail-crew/mainsail-config.git
path: /home/sovol/mainsail-config
primary_branch: master
type: git_repo

[include octoeverywhere-system.cfg]
